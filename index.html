<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediConnect — 動くプロトタイプ v2</title>
<style>
:root{--forest:#0a2a2a;--forest2:#11423c;--mint:#4ecfa0;--mintd:#2bb389;--paper:#eef3f1;
--ink:#16241f;--muted:#6b7a74;--line:#e4ebe8;--alert:#d9483b;--amber:#caa12f;--slate:#62727c;--tint:#eafaf4;}
*{box-sizing:border-box;}
body{margin:0;background:#dde7e3;color:var(--ink);min-height:100vh;
font-family:"Yu Gothic","YuGothic","Hiragino Kaku Gothic ProN","Hiragino Sans","Meiryo","Noto Sans JP",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace;}
.bar{background:var(--forest);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:30;}
.bar h1{font-size:1rem;margin:0;font-weight:700;}.bar .sub{font-size:.72rem;color:#9fc4b8;}
.seg{margin-left:auto;display:flex;background:#11423c;border-radius:10px;padding:3px;gap:3px;}
.seg button{border:0;background:transparent;color:#bcd6cd;font-size:.8rem;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:700;}
.seg button.on{background:var(--mint);color:#05332a;}
.reset{border:1px solid #1e4f48;background:transparent;color:#9fc4b8;border-radius:8px;padding:6px 11px;font-size:.74rem;cursor:pointer;}
.note{background:#11423c;color:#cfe5dd;font-size:.72rem;padding:7px 20px;}.note b{color:var(--mint);}
.stage{display:flex;justify-content:center;padding:26px 16px 60px;}
.phone{width:318px;background:#0c0c0e;border-radius:38px;padding:10px;box-shadow:0 16px 40px rgba(10,42,42,.28);}
.screen{background:var(--paper);border-radius:30px;overflow:hidden;height:620px;display:flex;flex-direction:column;position:relative;}
.notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:90px;height:19px;background:#0c0c0e;border-radius:12px;z-index:5;}
.ab{background:var(--forest);color:#fff;padding:24px 15px 12px;display:flex;align-items:center;gap:10px;flex:0 0 auto;}
.ab .t{font-weight:700;font-size:.94rem;}.ab .ic{cursor:pointer;opacity:.9;}
.body{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.tabs{display:flex;background:#fff;border-top:1px solid var(--line);flex:0 0 auto;}
.tabs .tb{flex:1;text-align:center;padding:9px 0 10px;font-size:.62rem;color:var(--muted);cursor:pointer;}
.tabs .tb .d{font-size:1.05rem;display:block;margin-bottom:3px;}
.tabs .tb.on{color:var(--forest);font-weight:700;}.tabs .tb.on .d{color:var(--mintd);}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;}
.card.key{background:var(--forest);color:#fff;border:0;}.card.key .lab{color:var(--mint);}
.lab{font-size:.67rem;color:var(--muted);font-weight:700;letter-spacing:.03em;}
.req{color:var(--alert);font-size:.6rem;font-weight:700;margin-left:4px;}
.big{font-size:1.15rem;font-weight:700;}
.row{display:flex;align-items:center;gap:8px;}.row .sp{flex:1;}
.muted{color:var(--muted);}.fs{font-size:.82rem;}.fxs{font-size:.73rem;}
.btn{display:block;width:100%;text-align:center;background:var(--mint);color:#05332a;font-weight:700;border-radius:11px;padding:13px;font-size:.86rem;border:0;cursor:pointer;}
.btn.ghost{background:#fff;border:1.5px solid var(--mint);color:var(--mintd);}.btn.dark{background:var(--forest);color:#fff;}
.btn.sm{padding:9px;font-size:.8rem;}
.chip{display:inline-block;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:.76rem;cursor:pointer;user-select:none;}
.chip.on{background:var(--tint);border-color:var(--mint);color:#0a5a45;font-weight:700;}
.chip.flagable.on{background:#fdecea;border-color:var(--alert);color:var(--alert);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.alert{background:#fff7ed;border:1px solid #f0d9ad;border-radius:11px;padding:11px;display:flex;gap:8px;align-items:center;cursor:pointer;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.badge{font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:6px;}
.b-warn{background:#fdecea;color:var(--alert);}.b-ok{background:var(--tint);color:#0a6b52;}.b-wait{background:#eef1f3;color:var(--slate);}
.step{display:flex;gap:5px;font-size:.67rem;color:var(--muted);}.step b{color:var(--mintd);}
.line{height:1px;background:var(--line);margin:3px 0;}
.sub{font-size:.66rem;color:var(--mintd);font-weight:700;}
.cal{display:flex;flex-wrap:wrap;margin-top:9px;}
.cal .h{width:14.28%;text-align:center;font-size:.6rem;color:var(--muted);padding-bottom:4px;}
.cal .h.sun{color:var(--alert);}
.cell{width:14.28%;text-align:center;padding:4px 0;border-radius:9px;cursor:pointer;}
.cell .dn{display:block;font-size:.76rem;}.cell .sym{display:block;font-size:.74rem;font-weight:700;margin-top:1px;}
.cell.past{cursor:default;}.cell.past .dn{color:#c4cdc9;}.cell.past .sym{visibility:hidden;}.cell.off{cursor:not-allowed;}
.cell.on{background:var(--mint);}.cell.on .dn,.cell.on .sym{color:#05332a;font-weight:700;}
.s-best{color:var(--mintd);}.s-ok{color:var(--mintd);}.s-few{color:var(--amber);}.s-full{color:#c0392b;}.s-off{color:#9aa6a1;}
.legend{display:flex;flex-wrap:wrap;gap:6px 10px;font-size:.64rem;color:var(--muted);}.legend b{font-size:.78rem;}
.tgrid{display:flex;flex-wrap:wrap;gap:6px;}
.tchip{width:calc((100% - 12px)/3);border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 0;text-align:center;cursor:pointer;}
.tchip .tt{font-size:.84rem;font-weight:700;}.tchip .ta{font-size:.8rem;font-weight:700;}
.tchip.on{background:var(--mint);border-color:var(--mint);}.tchip.on .tt,.tchip.on .ta{color:#05332a;}
.tchip.off{background:#f4f6f5;cursor:not-allowed;}.tchip.off .tt{color:#b7c0bc;}.tchip.off .ta{color:#c4cdc9;}
.qr{width:148px;height:148px;margin:8px auto;border:7px solid #fff;outline:1px solid var(--line);border-radius:12px;background:repeating-conic-gradient(#0a2a2a 0% 25%,#fff 0% 50%) 0 0/30px 30px;}
input[type=range]{width:100%;accent-color:var(--mint);}
input.temp{width:84px;font-size:1.1rem;font-weight:700;border:1px solid var(--line);border-radius:8px;padding:6px 9px;text-align:center;}
.nrsval{font-size:1.05rem;font-weight:700;}
.toast{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);background:var(--forest);color:#fff;padding:10px 16px;border-radius:10px;font-size:.78rem;opacity:0;transition:.25s;pointer-events:none;z-index:20;text-align:center;}
.toast.show{opacity:1;}
.hint{font-size:.66rem;color:var(--mintd);text-align:center;}
/* admin */
.browser{width:min(1000px,96vw);background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(10,42,42,.22);}
.chrome{background:#dfe7e3;display:flex;align-items:center;gap:7px;padding:9px 12px;}
.chrome .o{width:11px;height:11px;border-radius:50%;}
.chrome .url{flex:1;background:#fff;border-radius:7px;padding:5px 11px;font-size:.72rem;color:var(--muted);}
.win{display:flex;min-height:486px;}
.side{background:var(--forest);color:#cfe5dd;padding:15px 12px;width:172px;flex:0 0 172px;display:flex;flex-direction:column;}
.side .brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:.9rem;}
.side .clinic{font-size:.68rem;color:var(--mint);margin:2px 0 15px 28px;}
.nav a{display:flex;gap:9px;padding:9px 10px;border-radius:9px;color:#bcd6cd;font-size:.82rem;margin-bottom:2px;}
.nav a.on{background:var(--forest2);color:#fff;font-weight:700;}
.main{padding:16px 18px;background:#fbfdfc;flex:1;min-width:0;}
.mtop{display:flex;align-items:flex-end;gap:12px;margin-bottom:13px;}
.mtop h3{margin:0;font-size:1.05rem;color:var(--forest);}.mtop .date{color:var(--muted);font-size:.78rem;}
.kpis{display:flex;gap:8px;margin-left:auto;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 12px;text-align:center;min-width:60px;}
.kpi .v{font-weight:700;font-size:1.05rem;color:var(--forest);}.kpi .v.warn{color:var(--alert);}.kpi .k{font-size:.6rem;color:var(--muted);}
table.rs{width:100%;border-collapse:collapse;font-size:.78rem;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
table.rs th{background:#f1f5f3;color:var(--muted);text-align:left;padding:9px 11px;font-size:.66rem;}
table.rs td{padding:10px 11px;border-top:1px solid var(--line);}
table.rs tr.sel td{background:var(--tint);}
.detail{background:#fff;border-left:1px solid var(--line);padding:15px 14px;width:300px;flex:0 0 300px;display:flex;flex-direction:column;gap:10px;overflow:auto;max-height:560px;}
.kv{display:flex;font-size:.76rem;}.kv .k{width:66px;color:var(--muted);flex:0 0 66px;}
.ai{background:var(--forest);color:#eaf5f0;border-radius:11px;padding:12px;}
.ai .h{display:flex;gap:7px;color:var(--mint);font-size:.72rem;font-weight:700;margin-bottom:6px;}
.ai p{margin:0 0 8px;font-size:.78rem;line-height:1.6;}
.ai .nt{font-size:.63rem;color:#9fc4b8;border-top:1px solid #1e4f48;padding-top:7px;}
.empty{color:var(--muted);font-size:.8rem;text-align:center;padding:24px 10px;}
.billbox{background:#f7faf9;border:1px solid var(--line);border-radius:10px;padding:11px;}
.flow{display:flex;gap:4px;font-size:.6rem;color:var(--muted);margin-bottom:7px;flex-wrap:wrap;}
.flow .s{padding:2px 7px;border-radius:999px;background:#eef1f0;}
.flow .s.on{background:var(--mint);color:#05332a;font-weight:700;}
/* 未確定UIマーカー */
.ntoggle{border:1px solid var(--amber);background:transparent;color:#f4d98a;border-radius:8px;padding:6px 11px;font-size:.74rem;cursor:pointer;}
.ntoggle.on{background:var(--amber);color:#3a2e07;font-weight:700;}
[data-note]{position:relative;}
.nmark{position:absolute;top:-9px;left:-9px;min-width:19px;height:19px;padding:0 4px;background:var(--amber);color:#2a2206;font-size:.66rem;font-weight:700;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.3);z-index:9;}
.noted{outline:2px dashed var(--amber);outline-offset:2px;border-radius:8px;}
.noted.flash{animation:nflash 1.3s ease;}
@keyframes nflash{0%,100%{outline-color:var(--amber);}50%{outline-color:var(--alert);}}
body.noteson .stage{padding-bottom:168px;}
#notesPanel{position:fixed;left:0;right:0;bottom:0;background:#1b1e19;border-top:2px solid var(--amber);padding:9px 12px 11px;z-index:40;display:none;}
#notesPanel.on{display:block;}
#notesPanel .ph{color:#f4d98a;font-size:.72rem;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
#notesPanel .ph .x{margin-left:auto;cursor:pointer;color:#9fa89f;font-weight:400;}
.nrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;}
.nitem{flex:0 0 auto;width:208px;background:#272b24;border:1px solid #3a3f36;border-radius:10px;padding:8px 10px;cursor:pointer;}
.nitem:hover{border-color:var(--amber);background:#2d3129;}
.nitem .nn{display:inline-flex;width:17px;height:17px;background:var(--amber);color:#2a2206;font-size:.62rem;font-weight:700;border-radius:50%;align-items:center;justify-content:center;margin-right:6px;vertical-align:middle;}
.nitem .nt{color:#e7ece4;font-size:.73rem;font-weight:700;}
.nitem .nd{color:#aeb6ab;font-size:.65rem;margin-top:3px;line-height:1.4;}
.nitem .loc{color:#83b9a4;font-size:.6rem;margin-top:4px;}
/* コメントボタン */
#cmtBtn{position:fixed;right:16px;bottom:16px;z-index:45;background:var(--mint);color:#05332a;border:0;border-radius:999px;padding:11px 16px;font-size:.82rem;font-weight:700;box-shadow:0 6px 18px rgba(10,42,42,.3);cursor:pointer;}
#cmtBtn:hover{background:var(--mintd);color:#fff;}
body.noteson #cmtBtn{bottom:176px;}
</style></head><body>

<div class="bar">
  <svg width="22" height="22" viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="#4ecfa0" stroke-width="4"/><circle cx="20" cy="18" r="6" fill="#fff"/></svg>
  <div><h1>MediConnect — 動くプロトタイプ v2</h1><div class="sub" style="color:#9fc4b8;font-weight:400">タップで操作 ・ 問診詳細／待ち時間／会計フロー</div></div>
  <div class="seg"><button id="vp" class="on">患者アプリ</button><button id="va">管理画面</button></div>
  <button class="ntoggle" id="ntoggle">未確定UI</button>
  <button class="reset" id="reset">リセット</button>
</div>
<div class="note">※ <b>社外秘</b>・<b>合成データ</b>。問診項目・要注意条件は<b>大上監修の草案</b>。患者で問診提出→管理画面で会計作成・消込→患者の会計が確定、まで動きます。</div>
<div class="stage" id="stage"></div>
<div id="notesPanel"></div>
<button id="cmtBtn">💬 コメント</button>

<script>
"use strict";
const S={
 view:'patient',screen:'home',step:1,
 dept:null,date:null,time:null,booked:{dept:'内科',date:'8/24(月)',time:'10:30'},
 reason:[],onset:'3日前',course:'変わらない',nrs:5,temp:'',
 assoc:[],history:[],meds:'なし',allergy:'なし',preg:'該当なし',
 submitted:false,flagged:false,
 paid:false,adminBill:'none',notes:false
};
const DEPTS=['内科','小児科','皮膚科'];
const DAYS=[{n:17,past:true},{n:18,past:true},{n:19,s:'best'},{n:20,s:'ok'},{n:21,s:'few'},{n:22,s:'best'},{n:23,off:true},
 {n:24,s:'ok'},{n:25,s:'ok'},{n:26,s:'full'},{n:27,s:'few'},{n:28,s:'best'},{n:29,s:'ok'},{n:30,off:true}];
const SYM={best:'◎',ok:'〇',few:'△',full:'×',off:'休'};
const TIMES=[['9:00','best'],['9:30','ok'],['10:00','full'],['10:30','few'],['11:00','ok'],['11:30','few'],['14:00','best'],['14:30','few'],['15:00','full'],['15:30','ok'],['16:00','best'],['16:30','ok']];
const REASONS=['発熱','せき','のどの痛み','頭痛','腹痛','下痢','倦怠感','発疹'];
const ASSOC=['息苦しさ','胸の痛み','嘔吐','めまい','むくみ'];      // 息苦しさ/胸の痛み = レッドフラグ（要監修）
const REDFLAG=['息苦しさ','胸の痛み'];
const HISTORY=['高血圧','糖尿病','喘息','心臓病','なし'];
const WAIT_COUNT=5, WAIT_PER=3;                                  // 院設定：待ち人数 × 1人あたり目安(分)
const NOTES=[
 {n:1,t:'待ち時間の見せ方',d:'人数のみ／目安併記。列の単位（診療科・医師ごと）',loc:'患者・ホーム',go:{view:'patient',screen:'home'}},
 {n:2,t:'複数科の初期表示',d:'診療科が複数のときの並び順・初期選択',loc:'患者・予約',go:{view:'patient',screen:'booking',step:1}},
 {n:3,t:'当日締切',d:'当日予約は診療開始◯分前まで可？',loc:'患者・予約',go:{view:'patient',screen:'booking',step:3}},
 {n:4,t:'問診の項目',d:'項目の過不足・必須/任意の線引き',loc:'患者・問診',go:{view:'patient',screen:'inquiry'}},
 {n:5,t:'要注意の条件',d:'NRS≥7／体温≥38.5／レッドフラグ症状の範囲',loc:'患者・問診',go:{view:'patient',screen:'inquiry'}},
 {n:6,t:'会計の様式・文言',d:'領収書の様式・「会計待ち」の表現',loc:'患者・会計',go:{view:'patient',screen:'payment'}},
 {n:7,t:'AI要約の文言・免責',d:'要約の表現・免責の出し方',loc:'管理・予約管理',go:{view:'admin'}},
 {n:8,t:'明細入力・保険区分',d:'明細の入力方法・保険区分のUI',loc:'管理・会計',go:{view:'admin'}}
];
// === Googleフォーム設定（フォーム作成後にここだけ差し替え）===
// フォーム右上 ⋮ →「事前入力したURLを取得」で出た base と entry.xxxx を入れる
const FORM={
 base:'https://docs.google.com/forms/d/e/1FAIpQLSd3UAdH6H1CNx-M1xIdSbv6WKSTw3xX1DCF09wr9N7o-P3RMA/viewform',
 screen:'entry.1840518713', // 画面名
 note:'entry.2075635724',   // 論点番号
 comment:'entry.222346198', // コメント（頭にURLを差し込む）
 url:''                     // URL項目は無し
};
const stage=document.getElementById('stage');

function isFlag(){return S.nrs>=7 || (+S.temp>=38.5) || S.assoc.some(a=>REDFLAG.includes(a));}
function aiSummary(){
 const r=S.reason.length?S.reason.join('・'):'記載なし';
 const t=S.temp?S.temp+'℃':'記載なし';
 const extra=[];
 if(S.assoc.length)extra.push('随伴症状：'+S.assoc.join('・'));
 if(S.history.filter(h=>h!=='なし').length)extra.push('既往：'+S.history.filter(h=>h!=='なし').join('・'));
 let s=`${S.onset}からの${r}（経過：${S.course}）が主訴。NRS ${S.nrs}、体温 ${t}。`;
 if(extra.length)s+=extra.join('、')+'。';
 if(S.flagged)s+=' レッドフラグ／高熱・高NRSのため優先確認の候補。';
 return s;
}

/* chips */
function chips(group,opts,multi,flagable){
 return `<div class="chips">`+opts.map(o=>{
  const on=multi?S[group].includes(o):S[group]===o;
  const fl=flagable&&REDFLAG.includes(o)?'flagable':'';
  return `<span class="chip ${fl} ${on?'on':''}" data-g="${group}" data-v="${o}" data-multi="${multi?1:0}">${o}</span>`;
 }).join('')+`</div>`;}

/* patient frame */
function tab(n,i,l){return `<div class="tb ${S.screen===n?'on':''}" data-tab="${n}"><span class="d">${i}</span>${l}</div>`;}
function ab(title,back){return `<div class="ab">${back?`<span class="ic" data-tab="home">←</span>`:`<svg width="16" height="16" viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="#4ecfa0" stroke-width="4"/><circle cx="20" cy="18" r="6" fill="#fff"/></svg>`}<span class="t">${title}</span></div>`;}
function phone(inner,bar){return `<div class="phone"><div class="screen"><div class="notch"></div>${bar}<div class="body">${inner}</div>
 <div class="tabs">${tab('home','🏠','ホーム')}${tab('booking','📅','予約')}${tab('inquiry','📝','問診')}${tab('payment','🧾','会計')}</div>
 <div class="toast" id="toast"></div></div></div>`;}

function homeView(){
 const wait=WAIT_COUNT*WAIT_PER;
 const inq=S.submitted
  ?`<div class="card fxs"><div class="row"><span class="lab">事前問診</span><span class="sp"></span><span class="badge ${S.flagged?'b-warn':'b-ok'}">${S.flagged?'● 要注意':'提出済'}</span></div></div>`
  :`<div class="alert" data-tab="inquiry"><span class="dot" style="background:var(--amber)"></span><div class="fxs" style="flex:1">事前問診がまだです。来院前にご入力ください。</div><span class="chip on" style="padding:4px 9px">入力</span></div>`;
 const inner=`<div class="fs" style="font-weight:700">こんにちは、田中さん</div>
  <div class="card key"><div class="row"><span class="lab">次回の予約</span><span class="sp"></span><span class="badge b-ok">予約済み</span></div>
   <div class="big" style="margin:6px 0 2px">${S.booked.dept} ・ ${S.booked.date} ${S.booked.time}</div>
   <div class="fxs" style="opacity:.8">担当：大上 医師 ・ おおうえ内科クリニック</div>
   <button class="btn" style="margin-top:11px" data-act="qr">受付用QRを表示</button></div>
  ${inq}
  <div class="card" data-note="1"><div class="lab">本日の混雑状況</div>
   <div class="row" style="align-items:baseline;margin-top:2px"><span class="big" style="color:var(--mintd)">現在 ${WAIT_COUNT}人待ち</span><span class="sp"></span><span class="fs muted">目安 約${wait}分（概算）</span></div>
   <div class="fxs muted" style="margin-top:5px">※ 待ち人数＝受付済で「まだ呼ばれていない」人数（次に呼ばれる人が1番目）。診察中・未来院は含めません。診療科／医師ごとに集計。目安は人数×院設定の1人あたり（${WAIT_PER}分）の概算で、来院日に表示。</div></div>

function render(){
 document.getElementById('vp').classList.toggle('on',S.view==='patient');
 document.getElementById('va').classList.toggle('on',S.view==='admin');
 if(S.view==='admin'){stage.innerHTML=adminView();}
 else{
  let v;
  if(S.screen==='home')v=homeView();else if(S.screen==='booking')v=bookingView();
  else if(S.screen==='inquiry')v=inquiryView();else if(S.screen==='payment')v=paymentView();
  else if(S.screen==='qr')v=qrView();
  stage.innerHTML=v;wire();
 }
 afterRender();
}
function afterRender(){
 document.body.classList.toggle('noteson',S.notes);
 const p=document.getElementById('notesPanel'); if(p)p.classList.toggle('on',S.notes);
 if(S.notes) placeNotes();
}
function placeNotes(){
 stage.querySelectorAll('[data-note]').forEach(el=>{
  el.classList.add('noted');
  el.insertAdjacentHTML('afterbegin',`<span class="nmark">${el.getAttribute('data-note')}</span>`);
 });
}
function renderNotesBar(){
 const p=document.getElementById('notesPanel');
 p.innerHTML=`<div class="ph">未確定UIの論点（大上と確認）<span class="x" id="nclose">閉じる ✕</span></div>`
  +`<div class="nrow">`+NOTES.map((o,i)=>`<div class="nitem" data-i="${i}"><div class="nt"><span class="nn">${o.n}</span>${o.t}</div><div class="nd">${o.d}</div><div class="loc">📍 ${o.loc}</div></div>`).join('')+`</div>`;
 p.querySelector('#nclose').onclick=()=>{S.notes=false;document.getElementById('ntoggle').classList.remove('on');render();};
 p.querySelectorAll('.nitem').forEach(el=>el.onclick=()=>jumpNote(+el.dataset.i));
}
function jumpNote(i){
 const o=NOTES[i],g=o.go;
 S.view=g.view;
 if(g.view==='patient'){S.screen=g.screen;if(g.step)S.step=g.step;
   if(g.screen==='booking'&&g.step===3){S.dept=S.dept||'内科';S.date=S.date||24;}}
 if(g.view==='admin'&&!S.submitted){S.submitted=true;if(S.reason.length===0)S.reason=['発熱'];S.flagged=isFlag();}
 render();
 const m=stage.querySelector(`[data-note="${o.n}"]`);
 if(m){if(m.scrollIntoView)m.scrollIntoView({behavior:'smooth',block:'center'});m.classList.add('flash');setTimeout(()=>m.classList.remove('flash'),1300);}
}
function screenName(){
 if(S.view==='admin')return '管理画面';
 return ({home:'ホーム',booking:'予約',inquiry:'問診',payment:'会計',qr:'予約QR'})[S.screen]||S.screen;
}
function curNotes(){
 return NOTES.filter(o=>o.go.view===S.view && (S.view==='admin'||o.go.screen===S.screen)).map(o=>o.n).join(',');
}
function openComment(){
 const sc=screenName(), ns=curNotes(), pageUrl=location.href;
 if(!FORM.base){alert('Googleフォームが未設定です。\nスクリプト先頭の FORM 設定（base と entry ID）を入れると有効になります。\n\n（参考プリフィル）画面='+sc+' ／ 論点='+(ns||'—'));return;}
 const u=new URL(FORM.base);
 u.searchParams.set(FORM.screen,sc);
 if(ns)u.searchParams.set(FORM.note,ns);
 if(FORM.comment)u.searchParams.set(FORM.comment,`（対象: ${sc}${ns?' / 論点'+ns:''}）\n${pageUrl}\n\nコメント: `);
 if(FORM.url)u.searchParams.set(FORM.url,pageUrl);
 window.open(u.toString(),'_blank','noopener');
}
function toast(m){const t=document.getElementById('toast');if(!t)return;t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
function wire(){
 const nrs=document.getElementById('nrs');
 if(nrs)nrs.addEventListener('input',e=>{S.nrs=+e.target.value;document.getElementById('nrsv').textContent=S.nrs;const b=document.getElementById('nrsb');b.textContent=S.nrs>=7?'要注意':' ';b.className='badge '+(S.nrs>=7?'b-warn':'b-wait');});
 const tp=document.getElementById('temp');
 if(tp)tp.addEventListener('input',e=>{S.temp=e.target.value;const hi=+S.temp>=38.5;const b=document.getElementById('tempb');b.textContent=hi?'要注意':' ';b.className='badge '+(hi?'b-warn':'b-wait');});
}
stage.addEventListener('click',e=>{
 const t=e.target.closest('[data-tab],[data-dept],[data-date],[data-time],[data-g],[data-act]');
 if(!t)return;
 if(t.dataset.tab){S.screen=t.dataset.tab;if(t.dataset.tab==='booking')S.step=1;render();return;}
 if(t.dataset.date){S.date=+t.dataset.date;S.step=3;render();return;}
 if(t.dataset.time){S.time=t.dataset.time;S.step=4;render();return;}
 if(t.dataset.g){const g=t.dataset.g,v=t.dataset.v,multi=t.dataset.multi==='1';
   if(g==='dept'){S.dept=v;S.step=2;render();return;}
   if(multi){const a=S[g];const i=a.indexOf(v);i<0?a.push(v):a.splice(i,1);t.classList.toggle('on');}
   else{document.querySelectorAll(`[data-g="${g}"]`).forEach(el=>el.classList.remove('on'));t.classList.add('on');S[g]=v;}
   return;}
 const a=t.dataset.act;
 if(a==='confirm'){S.booked={dept:S.dept,date:'8/'+S.date+'(月)',time:S.time};S.paid=false;S.adminBill='none';S.step=5;render();return;}
 if(a==='qr'){S.screen='qr';render();return;}
 if(a==='submit'){if(S.reason.length===0){toast('受診理由を選んでください');return;}S.flagged=isFlag();S.submitted=true;render();toast(S.flagged?'提出しました（要注意）':'提出しました');return;}
 if(a==='reinq'){S.submitted=false;S.flagged=false;render();return;}
 if(a==='receipt'){toast('領収書PDF（サンプル）を表示');return;}
 if(a==='bill'){S.adminBill='creating';render();return;}
